name: Compile Resume

on:
  push:
    branches:
      - main
    paths:
      - "resume.tex"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex
          compiler: pdflatex

      - name: Move PDF to public folder
        run: |
          mkdir -p public
          mv resume.pdf public/Tafsir_Chowdhury_Resume.pdf

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-compile resume.tex to public/Tafsir_Chowdhury_Resume.pdf [skip ci]"
          file_pattern: 'public/Tafsir_Chowdhury_Resume.pdf'
